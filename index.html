<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* إعدادات الخلفية */
        body { margin: 0; padding: 0; }
        #bg-image {
            background-image: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1920');
            background-size: cover;
            background-position: center;
        }
        /* تنسيق البطاقات الشفافة */
        .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(5px); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body class="bg-gray-900 font-sans">
    
    <div id="bg-image" class="fixed inset-0 opacity-50 z-0"></div>
    
    <div id="app" class="relative max-w-md mx-auto min-h-screen bg-white/80 shadow-2xl z-10 flex flex-col justify-between">
        
        <div class="bg-white border-b border-gray-100 shadow-sm p-4 sticky top-0 z-50 flex flex-col gap-2">
            <div class="flex justify-between items-center w-full">
                <button id="backBtn" class="hidden bg-gray-800 text-white px-4 py-2 rounded-lg font-bold">⬅</button>
                
                <div class="flex items-center gap-4 ml-auto relative z-50">
                    
                    <a href="https://www.instagram.com/اسم_الحساب" target="_blank" class="text-gray-600 hover:text-pink-600 transition-colors">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                        </svg>
                    </a>
                    
                    <a href="https://www.facebook.com/اسم_الحساب" target="_blank" class="text-gray-600 hover:text-blue-600 transition-colors">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/>
                        </svg>
                    </a>
                    
                    <div class="relative">
                        <button onclick="toggleLangMenu()" class="w-10 h-10 rounded-full border shadow flex items-center justify-center text-xl bg-white">
                            <span id="currentFlag">🇫🇷</span>
                        </button>
                        <div id="langMenu" class="hidden absolute top-12 right-0 bg-white shadow-2xl rounded-xl p-2 border z-50 min-w-[50px]">
                            <button onclick="changeLanguage('ar', '🇲🇦')" class="block w-full text-center p-1 text-xl">🇲🇦</button>
                            <button onclick="changeLanguage('fr', '🇫🇷')" class="block w-full text-center p-1 text-xl">🇫🇷</button>
                            <button onclick="changeLanguage('en', '🇺🇸')" class="block w-full text-center p-1 text-xl">🇺🇸</button>
                        </div>
                    </div>
                    
                </div>
            </div>
            
            <div class="text-center py-1.5 border-t border-gray-50 mt-1">
                <h1 class="text-2xl font-black tracking-widest text-gray-900">CAFÉ LOUNGE</h1>
            </div>
        </div>

        <div id="content" class="grid gap-3 p-4 flex-grow"></div>
        
        <div class="bg-white border-t border-gray-100 shadow-md p-4 text-center sticky bottom-0 z-40 mt-auto">
            <p class="text-xs font-bold text-gray-400 tracking-wide">&copy; 2026 Café Lounge. All Rights Reserved.</p>
        </div>
        
    </div>
    
    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
