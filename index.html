<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* إعدادات الخلفية */
        body { margin: 0; padding: 0; }
        #bg-image {
            background-image: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1920');
            background-size: cover;
            background-position: center;
        }
        /* تنسيق البطاقات الشفافة */
        .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(5px); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body class="bg-gray-900 font-sans">
    
    <div id="bg-image" class="fixed inset-0 opacity-50 z-0"></div>
    
    <div id="app" class="relative max-w-md mx-auto min-h-screen bg-white/80 shadow-2xl p-4 z-10 flex flex-col">
        
        <div class="sticky top-0 bg-white border-b border-gray-100 shadow-sm p-4 -mx-4 -mt-4 mb-4 flex justify-between items-center z-50 flex-wrap">
            
            <div class="flex items-center gap-3">
                <button id="backBtn" class="hidden bg-gray-800 text-white px-3 py-1.5 rounded-lg font-bold transition-all">⬅</button>
                
                <a href="https://www.facebook.com/" target="_blank" class="text-gray-700 hover:text-blue-600 transition-colors flex items-center justify-center">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M22.675 0h-21.35C.597 0 0 .597 0 1.325v21.351C0 23.403.597 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.597 1.323-1.324V1.325C24 .597 23.403 0 22.675 0z"/>
                    </svg>
                </a>

                <a href="https://www.instagram.com/" target="_blank" class="text-gray-700 hover:text-pink-600 transition-colors flex items-center justify-center">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                    </svg>
                </a>

                <button onclick="toggleSearch()" class="text-gray-700 hover:text-blue-600 transition-colors flex items-center justify-center ml-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </div>

            <div class="relative">
                <button onclick="toggleLangMenu()" class="flex items-center gap-1 bg-gray-50 hover:bg-gray-100 border border-gray-200 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                    <span id="currentFlag">🇫🇷</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="langMenu" class="hidden absolute top-full right-0 mt-2 w-32 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden z-50">
                    <button onclick="changeLanguage('ar', '🇲🇦')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2 border-b border-gray-50"><span>🇲🇦</span> العربية</button>
                    <button onclick="changeLanguage('fr', '🇫🇷')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2 border-b border-gray-50"><span>🇫🇷</span> Français</button>
                    <button onclick="changeLanguage('en', '🇬🇧')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2"><span>🇬🇧</span> English</button>
                </div>
            </div>

            <div id="searchContainer" class="hidden w-full mt-4 transition-all">
                <input type="text" id="searchInput" onkeyup="performSearch(this.value)" placeholder="ابحث عن طبق أو مشروب..." class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-full focus:ring-blue-500 focus:border-blue-500 block px-4 py-2.5 outline-none shadow-inner">
            </div>

        </div>

        <div id="content" class="flex-1 pb-6 relative">
            </div>

    </div>

    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
