<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digital</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#fef3c7',
                            DEFAULT: '#d97706',
                            dark: '#78350f',
                        }
                    },
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'], 
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    
    <style>
        body { margin: 0; padding: 0; }
        #bg-image {
            background-image: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1920');
            background-size: cover;
            background-position: center;
        }
        .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(5px); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body class="bg-gray-900 font-sans">
    
    <div id="bg-image" class="fixed inset-0 opacity-50 z-0"></div>
    
    <div id="app" class="relative max-w-md mx-auto min-h-screen bg-white/80 shadow-2xl p-4 z-10 flex flex-col">
        
        <div class="sticky top-0 bg-white border border-gray-100 shadow-sm p-4 -mx-4 -mt-4 mb-4 flex justify-between items-center z-50 flex-wrap rounded-b-xl">
            
           <div class="flex items-center gap-3">
    <button id="backBtn" aria-label="Retour" class="hidden bg-gray-800 text-white px-3 py-1.5 rounded-lg font-bold transition-all">⬅</button>
    
    <a href="https://www.facebook.com/" target="_blank" aria-label="Visitez notre page Facebook" class="text-gray-700 hover:text-blue-600 transition-colors flex items-center justify-center">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="..."/></svg>
    </a>

    <a href="https://www.instagram.com/" target="_blank" aria-label="Visitez notre page Instagram" class="text-gray-700 hover:text-pink-600 transition-colors flex items-center justify-center">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="..."/></svg>
    </a>

    <button onclick="toggleSearch()" aria-label="Rechercher un plat" class="text-gray-700 hover:text-blue-600 transition-colors flex items-center justify-center ml-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </button>
</div>

<div class="relative">
    <button onclick="toggleLangMenu()" aria-label="Changer la langue" aria-haspopup="true" aria-expanded="false" class="flex items-center gap-1 bg-gray-50 hover:bg-gray-100 border border-gray-200 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
        <span id="currentFlag">🇫🇷</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
    </button>
    </div>

            <div class="relative">
                <button onclick="toggleLangMenu()" class="flex items-center gap-1 bg-gray-50 hover:bg-gray-100 border border-gray-200 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                    <span id="currentFlag">🇫🇷</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="langMenu" class="hidden absolute top-full right-0 mt-2 w-32 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden z-50">
                    <button onclick="changeLanguage('ar', '🇲🇦')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2 border-b border-gray-50"><span>🇲🇦</span> العربية</button>
                    <button onclick="changeLanguage('fr', '🇫🇷')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2 border-b border-gray-50"><span>🇫🇷</span> Français</button>
                    <button onclick="changeLanguage('en', '🇬🇧')" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2"><span>🇬🇧</span> English</button>
                </div>
            </div>

            <div id="searchContainer" class="hidden w-full mt-4 transition-all">
                <input type="text" id="searchInput" onkeyup="performSearch(this.value)" placeholder="..." class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-full focus:ring-blue-500 focus:border-blue-500 block px-4 py-2.5 outline-none shadow-inner">
            </div>

        </div>

        <div id="mainLogo" class="flex justify-center items-center py-2 mb-4 transition-all duration-300">
            <img src="https://via.placeholder.com/150x80?text=Votre+Logo" alt="Logo" class="h-20 object-contain drop-shadow-md">
        </div>

        <div id="content" class="flex-1 pb-6 relative">
            </div>

        <footer class="mt-auto bg-white border border-gray-100 shadow-sm p-4 -mx-4 -mb-4 rounded-t-xl text-center">
            <p class="text-sm text-gray-600 font-medium">© <span id="currentYear"></span> Menu Digital. Tous droits réservés.</p>
        
        </footer>

    </div>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>

    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
